services:
  openhab-mcp:
    image: ghcr.io/drrsatzteil/openhab-mcp:latest
    container_name: openhab-mcp
    restart: unless-stopped
    ports:
      - "8081:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin  # must match openHAB timezone for manage_logs time filters
    volumes:
      # Optional: mount openHAB log directory for manage_logs read action
      # - /opt/openhab/userdata/logs:/app/logs:ro
      # Then set in .env: OPENHAB_LOG_PATH=/app/logs
    networks:
      - openhab-network

networks:
  openhab-network:
    driver: bridge
    name: openhab-network
