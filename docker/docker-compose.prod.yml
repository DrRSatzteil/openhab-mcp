services:
  openhab-mcp:
    image: ghcr.io/drrsatzteil/openhab-mcp:latest
    container_name: openhab-mcp
    restart: unless-stopped
    ports:
      - "8081:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Berlin  # must match openHAB timezone for manage_logs time filters
      - HEALTH_SUPPRESSIONS_PATH=/app/data/health_suppressions.json
    volumes:
      - ./data:/app/data                              # health suppressions and other persistent data
      - /opt/openhab/userdata/logs:/app/logs:ro       # openHAB log directory for manage_logs
    networks:
      - openhab-network

networks:
  openhab-network:
    driver: bridge
    name: openhab-network
