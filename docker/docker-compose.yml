version: '3.8'

services:
  openhab-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: openhab-mcp
    restart: unless-stopped
    ports:
      - "8081:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - HEALTH_SUPPRESSIONS_PATH=/app/data/health_suppressions.json
    volumes:
      - ./data:/app/data                              # health suppressions and other persistent data
      - /opt/openhab/userdata/logs:/app/logs:ro       # openHAB log directory for manage_logs
    networks:
      - openhab-network

networks:
  openhab-network:
    driver: bridge
    name: openhab-network
